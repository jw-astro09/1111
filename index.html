<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPT 공유 및 실시간 투표</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; line-height: 1.6; padding: 20px; max-width: 800px; margin: 0 auto; }
        h2 { color: #333; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        a { text-decoration: none; color: #007bff; }
        a:hover { text-decoration: underline; }
        
        /* 투표 섹션 스타일 */
        #vote-container { 
            margin-top: 40px; 
            padding: 25px; 
            background: #f8f9fa; 
            border: 1px solid #dee2e6; 
            border-radius: 12px; 
            text-align: center;
        }
        #timer { 
            font-size: 1.2em; 
            color: #d9534f; 
            font-weight: bold; 
            margin-bottom: 20px; 
            padding: 10px;
            background: #fff;
            display: inline-block;
            border-radius: 5px;
            border: 1px solid #ffccd5;
        }
        .vote-buttons button { 
            padding: 12px 25px; 
            font-size: 1em; 
            cursor: pointer; 
            margin: 5px; 
            border: none; 
            border-radius: 5px; 
            transition: 0.3s;
            background-color: #007bff;
            color: white;
        }
        .vote-buttons button:hover { background-color: #0056b3; }
        .vote-buttons button:disabled { background-color: #ccc; cursor: not-allowed; }
        
        #vote-result { 
            margin-top: 25px; 
            padding-top: 20px; 
            border-top: 1px dashed #ccc; 
            font-size: 1.1em; 
        }
        .count-num { color: #007bff; font-weight: bold; }
    </style>
</head>
<body>

    <a href="https://www.miricanvas.com/login?redirect=%2Fv2%2Fko%2Fdesign2%2F9cd541c7-a031-472f-ba81-2cd166f11f7f%3Flocation%3Ddesign%26type%3Dcopy_link%26access%3Dlink%26permission%3Deditor"><h2>PPT(Miricanvas) 보러가기</h2></a>
    <br>
    <a href="https://www.canva.com/design/DAHExU7WnZU/U0n_zhNlTQgP2NGvEcVv8A/edit?utm_content=DAHExU7WnZU&utm_campaign=designshare&utm_medium=link2&utm_source=sharebutton"><h2>PPT(Canva) 보러가기</h2></a>
    <br>
    <a href="https://jw-astro09.github.io/1111/밀도.html"><h2>밀도 시뮬레이션</h2></a>
    <br>
    <a href="https://jw-astro09.github.io/1111/순환시뮬1.html"><h2>순환 시뮬레이션1</h2></a>
    <br>
    <a href="https://jw-astro09.github.io/1111/순환시뮬2.html"><h2>순환 시뮬레이션2</h2></a>
    <br>
    <a href="https://jw-astro09.github.io/1111/영상.html"><h2>영상 자료</h2></a>

    <hr>

    <div id="vote-container">
        <h3>PPT 투표하기</h3>
        
        <div id="timer">남은 시간 계산 중...</div>
        
        <div class="vote-buttons">
            <button id="btn-miricanvas" onclick="castVote('miricanvas')">Miricanvas에 투표</button>
            <button id="btn-canva" onclick="castVote('canva')">Canva에 투표</button>
        </div>

        <div id="vote-result">
            <p>Miricanvas: <span id="count-miri" class="count-num">0</span>표</p>
            <p>Canva: <span id="count-canva" class="count-num">0</span>표</p>
        </div>
        <p style="font-size: 0.85em; color: #888;">* 투표는 익명이며, 마감 전까지 언제든 수정 가능합니다.<br>또한 중복 투표는 불가능하며, 투표 수정은 자동으로 되게 설정되었습니다.</p>
    </div>

    <script>
        // --- 1. 설정 영역 ---
        
        // 투표 마감 시간 설정 (년, 월-1, 일, 시, 분, 초)
        const deadline = new Date(2026, 2, 30, 23, 59, 59).getTime();

        const firebaseConfig = {
            apiKey: "AIzaSyB6klaR0hR3R9_xFnUZFkvr2PEnd4bpfE8",
            authDomain: "bshs-vote.firebaseapp.com",
            databaseURL: "https://bshs-vote-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "bshs-vote",
            storageBucket: "bshs-vote.firebasestorage.app",
            messagingSenderId: "344014838794",
            appId: "1:344014838794:web:1ba892b83a635d891813f3",
            measurementId: "G-JP654LH4QV"
        };

        // --- 2. 로직 영역 ---

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const voteRef = db.ref('ppt_votes');
        let isExpired = false;

        // 타이머 업데이트
        const timerTask = setInterval(() => {
            const now = new Date().getTime();
            const diff = deadline - now;

            if (diff <= 0) {
                clearInterval(timerTask);
                document.getElementById('timer').innerText = "⌛ 투표가 종료되었습니다.";
                document.querySelectorAll('.vote-buttons button').forEach(btn => btn.disabled = true);
                isExpired = true;
                return;
            }

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById('timer').innerText = `⏱️ 마감까지: ${d}일 ${h}시간 ${m}분 ${s}초`;
        }, 1000);

        // 투표 처리 (익명 재투표/수정 포함)
        function castVote(newChoice) {
            if (isExpired) {
                alert("이미 투표가 마감되었습니다.");
                return;
            }

            const oldChoice = localStorage.getItem('my_ppt_vote');

            if (oldChoice === newChoice) {
                alert("이미 해당 항목에 투표하셨습니다.");
                return;
            }

            // 이전 기록이 있다면 취소(-1) 처리
            if (oldChoice) {
                db.ref('ppt_votes/' + oldChoice).transaction(c => (c || 1) - 1);
            }

            // 새 선택지에 추가(+1) 처리
            db.ref('ppt_votes/' + newChoice).transaction(c => (c || 0) + 1);

            localStorage.setItem('my_ppt_vote', newChoice);
            alert("투표가 성공적으로 반영되었습니다!");
        }

        // 실시간 결과 리스너
        voteRef.on('value', (snapshot) => {
            const data = snapshot.val() || { miricanvas: 0, canva: 0 };
            document.getElementById('count-miri').innerText = data.miricanvas || 0;
            document.getElementById('count-canva').innerText = data.canva || 0;
        });

    </script>
</body>
</html>
