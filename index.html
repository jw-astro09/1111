<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>ppt 공유 및 투표</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
</head>
<body>
    <a href="https://www.miricanvas.com/login?redirect=%2Fv2%2Fko%2Fdesign2%2F9cd541c7-a031-472f-ba81-2cd166f11f7f%3Flocation%3Ddesign%26type%3Dcopy_link%26access%3Dlink%26permission%3Deditor"><h2>ppt(miricanvas)</h2></a>
    <br>
    <a href="https://www.canva.com/design/DAHExU7WnZU/U0n_zhNlTQgP2NGvEcVv8A/edit?utm_content=DAHExU7WnZU&utm_campaign=designshare&utm_medium=link2&utm_source=sharebutton"><h2>ppt(canva)</h2></a>
    <br>
    <a href="https://jw-astro09.github.io/1111/밀도.html"><h2>밀도 시뮬레이션</h2></a>
    <br>
    <a href="https://jw-astro09.github.io/1111/순환시뮬1.html"><h2>순환 시뮬레이션1</h2></a>
    <br>
    <a href="https://jw-astro09.github.io/1111/순환시뮬2.html"><h2>순환 시뮬레이션2</h2></a>
    <br>
    <a href="https://jw-astro09.github.io/1111/영상.html"><h2>영상</h2></a>

    <hr>

    <div id="vote-container" style="padding: 15px; background: #f0f2f5; border-radius: 8px;">
        <h3>더 마음에 드는 PPT 투표</h3>
        <button onclick="castVote('miricanvas')" style="padding: 8px 15px;">Miricanvas 선택</button>
        <button onclick="castVote('canva')" style="padding: 8px 15px;">Canva 선택</button>
        
        <div id="vote-status" style="margin-top: 15px; font-weight: bold;">
            투표 데이터를 연결 중입니다...
        </div>
    </div>

    <script>
        // 사용자가 제공한 최신 설정값
        const firebaseConfig = {
            apiKey: "AIzaSyB6klaR0hR3R9_xFnUZFkvr2PEnd4bpfE8",
            authDomain: "bshs-vote.firebaseapp.com",
            databaseURL: "https://bshs-vote-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "bshs-vote",
            storageBucket: "bshs-vote.firebasestorage.app",
            messagingSenderId: "344014838794",
            appId: "1:344014838794:web:1ba892b83a635d891813f3",
            measurementId: "G-JP654LH4QV"
        };

        // Firebase 초기화
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const voteRef = db.ref('ppt_votes');

        // 투표 함수
        function castVote(selection) {
            const lastVote = localStorage.getItem('my_ppt_vote');

            if (lastVote === selection) {
                alert("이미 이 항목에 투표하셨습니다.");
                return;
            }

            // 1. 기존 투표가 있다면 -1 처리
            if (lastVote) {
                db.ref('ppt_votes/' + lastVote).transaction((count) => (count || 1) - 1);
            }

            // 2. 새 투표 +1 처리
            db.ref('ppt_votes/' + selection).transaction((count) => (count || 0) + 1);

            // 3. 로컬 스토리지 저장 (수정 가능하도록)
            localStorage.setItem('my_ppt_vote', selection);
            alert("투표가 성공적으로 반영되었습니다!");
        }

        // 실시간 결과 반영
        voteRef.on('value', (snapshot) => {
            const votes = snapshot.val() || { miricanvas: 0, canva: 0 };
            const m = votes.miricanvas || 0;
            const c = votes.canva || 0;
            
            document.getElementById('vote-status').innerHTML = 
                `현재 현황<br>📍 Miricanvas: ${m}표<br>📍 Canva: ${c}표`;
        }, (error) => {
            console.error("데이터 읽기 실패:", error);
            document.getElementById('vote-status').innerText = "권한이 없거나 설정 오류가 발생했습니다.";
        });
    </script>
</body>
</html>
