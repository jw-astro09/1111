<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>심층 순환 설명 영상</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;500;700;900&display=swap');
  
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background-color: #000;
    color: #fff;
    font-family: 'Noto Sans KR', sans-serif;
    overflow: hidden; /* 화면 꽉 차게 */
    user-select: none;
  }

  /* 영상 컨테이너 */
  #video-container {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #020813;
  }

  /* 캔버스 */
  canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 1;
  }

  /* 비네팅 효과 (가장자리 어둡게) */
  .vignette {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: radial-gradient(circle, rgba(0,0,0,0) 50%, rgba(0,0,0,0.8) 100%);
    z-index: 2;
    pointer-events: none;
  }

  /* 자막 영역 */
  #subtitle-container {
    position: absolute;
    bottom: 15%;
    left: 0; width: 100%;
    text-align: center;
    z-index: 10;
    pointer-events: none;
    padding: 0 20px;
  }
  .subtitle {
    display: inline-block;
    background: rgba(0, 0, 0, 0.6);
    padding: 15px 30px;
    border-radius: 12px;
    font-size: clamp(1.2em, 3vw, 2em);
    font-weight: 700;
    line-height: 1.5;
    text-shadow: 0 2px 10px rgba(0,0,0,0.8);
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    border: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(5px);
  }
  .subtitle.show {
    opacity: 1;
    transform: translateY(0);
  }
  .subtitle em {
    font-style: normal;
    color: #4fc3f7;
  }
  .subtitle .warn {
    color: #ff5252;
  }

  /* 중앙 타이틀 (도입부) */
  #center-title {
    position: absolute;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 15;
    opacity: 0;
    transition: opacity 2s;
    pointer-events: none;
  }
  #center-title.show { opacity: 1; }
  #center-title h1 {
    font-size: clamp(3em, 6vw, 5em);
    font-weight: 900;
    letter-spacing: 2px;
    margin-bottom: 10px;
    background: linear-gradient(135deg, #fff, #81d4fa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 10px 30px rgba(0,0,0,0.8);
  }
  #center-title p {
    font-size: 1.5em;
    color: #a0c0e0;
    font-weight: 300;
  }

  /* 컨트롤 바 (유튜브 스타일) */
  #controls {
    position: absolute;
    bottom: 0; left: 0; width: 100%;
    background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
    padding: 30px 30px 15px;
    z-index: 20;
    display: flex;
    flex-direction: column;
    gap: 10px;
    opacity: 0;
    transition: opacity 0.5s;
  }
  #video-container:hover #controls, #controls:hover {
    opacity: 1;
  }
  
  .progress-wrap {
    width: 100%;
    height: 8px;
    background: rgba(255,255,255,0.2);
    border-radius: 4px;
    cursor: pointer;
    position: relative;
  }
  .progress-bar {
    height: 100%;
    background: #4fc3f7;
    border-radius: 4px;
    width: 0%;
    position: relative;
  }
  .progress-bar::after {
    content: '';
    position: absolute;
    right: -6px; top: -4px;
    width: 16px; height: 16px;
    background: #fff;
    border-radius: 50%;
    box-shadow: 0 0 5px rgba(0,0,0,0.5);
    transform: scale(0);
    transition: transform 0.2s;
  }
  .progress-wrap:hover .progress-bar::after {
    transform: scale(1);
  }

  .btn-row {
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .play-btn {
    background: none; border: none; color: #fff;
    font-size: 24px; cursor: pointer;
    transition: color 0.2s;
  }
  .play-btn:hover { color: #4fc3f7; }
  .time-display {
    font-size: 14px; color: #ccc; font-weight: 500; letter-spacing: 1px;
  }

  /* 최초 시작 오버레이 */
  #start-overlay {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.8);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 50;
    backdrop-filter: blur(5px);
  }
  .big-play {
    width: 100px; height: 100px;
    background: rgba(79,195,247,0.2);
    border: 2px solid #4fc3f7;
    border-radius: 50%;
    color: #4fc3f7;
    font-size: 40px;
    cursor: pointer;
    display: flex; justify-content: center; align-items: center;
    padding-left: 8px; /* 재생 아이콘 시각적 중앙 정렬 */
    transition: all 0.3s;
    box-shadow: 0 0 30px rgba(79,195,247,0.3);
  }
  .big-play:hover {
    background: #4fc3f7; color: #000;
    transform: scale(1.1);
    box-shadow: 0 0 50px rgba(79,195,247,0.6);
  }

  /* 플래시 효과 (경고) */
  #flash {
    position: absolute; top:0; left:0; width:100%; height:100%;
    background: rgba(255,0,0,0.3);
    z-index: 5;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s;
  }

</style>
</head>
<body>

<div id="video-container">
  <canvas id="stage"></canvas>
  <div class="vignette"></div>
  <div id="flash"></div>

  <div id="center-title">
    <h1>심층 순환</h1>
    <p>지구의 심장, 대양 컨베이어 벨트</p>
  </div>

  <div id="subtitle-container">
    <div class="subtitle" id="sub-text"></div>
  </div>

  <div id="start-overlay">
    <div style="text-align:center">
      <button class="big-play" onclick="startVideo()">▶</button>
      <p style="margin-top:20px; color:#a0c0e0; font-size:1.2em; font-weight:500;">재생버튼을 눌러주세요</p>
    </div>
  </div>

  <div id="controls">
    <div class="progress-wrap" id="progressBar" onclick="seek(event)">
      <div class="progress-bar" id="progress"></div>
    </div>
    <div class="btn-row">
      <button class="play-btn" id="playPauseBtn" onclick="togglePlay()">⏸</button>
      <div class="time-display"><span id="currTime">0:00</span> / <span id="totTime">1:00</span></div>
    </div>
  </div>
</div>

<script>
/**
 * 다큐멘터리 스크립트 (타임라인)
 * 총 60초 분량
 */
const script = [
  { t: 0, end: 4, text: "", showTitle: true },
  { t: 5, end: 9, text: "바닷물을 움직이는 거대한 엔진이 있습니다." },
  { t: 9.5, end: 14, text: "그 핵심 원리는 바로 <em>'온도와 염분에 의한 밀도 차이'</em>입니다." },
  { t: 15, end: 20, text: "북대서양 고위도, 차가운 바람이 해수를 얼리면 남은 물은 <em>매우 짜고 차가워집니다.</em>" },
  { t: 20.5, end: 25, text: "무거워진 해수는 심해(4,000m)로 가라앉습니다. <em>(침강)</em>" },
  { t: 26, end: 31, text: "침강한 해수는 전 세계 해저 바닥을 따라 천천히 이동합니다. (초속 약 2cm)" },
  { t: 31.5, end: 36, text: "그리고 태평양 등에서 상승하여<em>(용승)</em> 다시 표층을 따라 북대서양으로 돌아옵니다." },
  { t: 37, end: 41, text: "이 순환은 열을 운반하여 <em>지구의 기후를 따뜻하게 유지</em>해 줍니다." },
  { t: 42, end: 45, text: "하지만, <span class='warn'>지구온난화</span>가 발생하면 어떻게 될까요?" },
  { t: 46, end: 51, text: "빙하가 녹아 엄청난 양의 <em>담수(맹물)</em>가 유입되면, 바닷물이 싱거워져 밀도가 낮아집니다." },
  { t: 52, end: 57, text: "<span class='warn'>결국 침강이 멈추고 심층 순환이 끊어져,</span> 빙하기와 같은 기후 재앙이 올 수 있습니다." },
  { t: 58, end: 62, text: "지구의 심장, 심층 순환을 지켜야 할 때입니다." }
];

const DURATION = 62; // 총 길이 (초)

// 상태 변수
let isPlaying = false;
let currentTime = 0;
let lastTime = performance.now();

// 캔버스 설정
const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d');
let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// 장면(Scene) 변수
let sceneState = {
  circSpeed: 1,      // 순환 속도 (1=정상, 0=정지)
  iceSize: 1,        // 빙하 크기
  warmTint: 0,       // 온난화 붉은빛 (0~1)
  meltDrops: 0,      // 담수 유입량
  highlightPhase: '' // 특정 영역 하이라이트
};

// 파티클 클래스
class Particle {
  constructor() {
    this.progress = Math.random();
    this.offset = (Math.random() - 0.5) * 20;
    this.size = 2.5 + Math.random() * 3;
    this.alpha = 0.6 + Math.random() * 0.4;
  }
  update(dt) {
    // 순환 속도에 따라 이동
    let speed = 0.05 * sceneState.circSpeed * dt;
    // 침강/용승 구간에서 속도 조절
    if (this.progress > 0.25 && this.progress < 0.4) speed *= 1.5;
    this.progress += speed;
    if (this.progress > 1) this.progress -= 1;
  }
  draw(ctx) {
    const sY = H * 0.25;
    const dY = H * 0.85;
    const lX = W * 0.1;
    const rX = W * 0.9;
    
    let x, y, color;
    const p = this.progress;

    if (p < 0.25) { // 표층 (오른쪽으로)
      let t = p / 0.25;
      x = lX + (rX - lX) * t;
      y = sY + Math.sin(t * 10 + currentTime * 2) * 5 + this.offset * 0.5;
      color = '#ff4b4b'; // 빨강 (따뜻)
    } else if (p < 0.4) { // 침강 (아래로)
      let t = (p - 0.25) / 0.15;
      x = rX + Math.sin(t * Math.PI) * 15;
      y = sY + (dY - sY) * t;
      color = '#ffd54f'; // 노랑
    } else if (p < 0.8) { // 심층 (왼쪽으로)
      let t = (p - 0.4) / 0.4;
      x = rX - (rX - lX) * t;
      y = dY + Math.sin(t * 8 + currentTime) * 5 + this.offset * 0.5;
      color = '#4fc3f7'; // 파랑 (차갑)
    } else { // 용승 (위로)
      let t = (p - 0.8) / 0.2;
      x = lX + Math.sin(t * Math.PI) * 15;
      y = dY - (dY - sY) * t;
      color = '#69f0ae'; // 초록
    }

    // 하이라이트 처리
    let activeAlpha = this.alpha;
    if (sceneState.highlightPhase === 'sink' && (p < 0.25 || p > 0.4)) activeAlpha *= 0.1;
    if (sceneState.highlightPhase === 'deep' && (p < 0.4 || p > 0.8)) activeAlpha *= 0.1;
    
    // 온난화 시 전체적으로 색이 흐려짐
    if (sceneState.circSpeed < 0.5) activeAlpha *= Math.max(0.2, sceneState.circSpeed * 2);

    ctx.globalAlpha = activeAlpha;
    ctx.beginPath();
    ctx.arc(x, y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();

    // Glow
    ctx.beginPath();
    ctx.arc(x, y, this.size * 3, 0, Math.PI * 2);
    let grad = ctx.createRadialGradient(x, y, 0, x, y, this.size * 3);
    grad.addColorStop(0, color);
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.globalAlpha = activeAlpha * 0.3;
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

const particles = [];
for (let i = 0; i < 200; i++) particles.push(new Particle());

// 화면 그리기
function draw() {
  ctx.clearRect(0, 0, W, H);
  const sY = H * 0.25;
  const dY = H * 0.85;

  // 1. 하늘 (온난화에 따라 붉어짐)
  let r = 5 + sceneState.warmTint * 80;
  let g = 15 + sceneState.warmTint * 20;
  let b = 30 - sceneState.warmTint * 10;
  ctx.fillStyle = `rgb(${r},${g},${b})`;
  ctx.fillRect(0, 0, W, sY);

  // 2. 바다 (온난화에 따라 탁해짐)
  let og = ctx.createLinearGradient(0, sY, 0, H);
  og.addColorStop(0, `rgb(${10 + sceneState.warmTint * 30}, ${40 - sceneState.warmTint * 10}, ${80 - sceneState.warmTint * 20})`);
  og.addColorStop(0.5, '#051833');
  og.addColorStop(1, '#020611');
  ctx.fillStyle = og;
  ctx.fillRect(0, sY, W, H - sY);

  // 3. 빙하 (오른쪽 위)
  let iceW = 150 * sceneState.iceSize;
  let iceH = 80 * sceneState.iceSize;
  ctx.fillStyle = `rgba(200,230,255, ${0.4 + sceneState.iceSize * 0.4})`;
  ctx.beginPath();
  ctx.moveTo(W - iceW, sY);
  ctx.quadraticCurveTo(W - iceW * 0.5, sY - iceH, W, sY - iceH * 0.8);
  ctx.lineTo(W, sY);
  ctx.closePath();
  ctx.fill();

  // 4. 담수 유입 애니메이션 (온난화 시)
  if (sceneState.meltDrops > 0) {
    ctx.fillStyle = `rgba(150,220,255,${sceneState.meltDrops})`;
    for(let i=0; i<8; i++) {
      let dx = W - iceW*0.6 + Math.sin(currentTime*3 + i)*30;
      let dy = sY + ((currentTime*50 + i*20) % 80);
      ctx.beginPath(); ctx.arc(dx, dy, 3, 0, Math.PI*2); ctx.fill();
    }
    // 텍스트 경고
    ctx.fillStyle = `rgba(150,220,255,${sceneState.meltDrops * (0.5 + Math.sin(currentTime*5)*0.5)})`;
    ctx.font = 'bold 20px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText("💧 담수 유입", W - iceW*0.5, sY + 40);
  }

  // 5. 대륙 (왼쪽 위)
  ctx.fillStyle = '#0a1610';
  ctx.beginPath();
  ctx.moveTo(0, sY);
  ctx.quadraticCurveTo(W * 0.05, sY - 50, W * 0.1, sY);
  ctx.closePath();
  ctx.fill();

  // 6. 파도
  ctx.fillStyle = 'rgba(79,195,247,0.1)';
  ctx.beginPath(); ctx.moveTo(0, sY);
  for(let x=0; x<=W; x+=5) {
    ctx.lineTo(x, sY + Math.sin(x*0.01 + currentTime*2)*4 + Math.sin(x*0.005 + currentTime)*3);
  }
  ctx.lineTo(W, sY-10); ctx.lineTo(0, sY-10); ctx.closePath(); ctx.fill();

  // 7. 파티클(물방울) 업데이트 및 그리기
  particles.forEach(p => {
    if (isPlaying) p.update(1/60); // 고정 dt 기준 계산
    p.draw(ctx);
  });

  // 8. 텍스트 라벨 (위치 표시)
  ctx.globalAlpha = 0.5;
  ctx.fillStyle = '#fff';
  ctx.font = '14px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText("저위도 (태평양/인도양)", W * 0.1, sY - 20);
  ctx.fillText("고위도 (북대서양)", W * 0.9, sY - 20);
  ctx.textAlign = 'left';
  ctx.fillText("표층", 20, sY + 30);
  ctx.fillText("심해 (약 4,000m)", 20, dY + 30);
  ctx.globalAlpha = 1;

  // 9. 큰 화살표 (하이라이트 구간)
  if (sceneState.highlightPhase === 'sink') {
    drawBigArrow(W*0.92, sY+50, 0, 100, '#ffd54f');
    drawTextOverlay("침강 (Sinking)", W*0.92, sY+180, '#ffd54f');
  } else if (sceneState.highlightPhase === 'deep') {
    drawBigArrow(W*0.6, dY, -100, 0, '#4fc3f7');
    drawTextOverlay("심해 대이동", W*0.6, dY-30, '#4fc3f7');
  }

  // 10. 순환 정지 경고 화면
  if (sceneState.circSpeed < 0.1) {
    ctx.fillStyle = `rgba(255,0,0,${0.1 + Math.sin(currentTime*4)*0.05})`;
    ctx.fillRect(0,0,W,H);
    ctx.fillStyle = '#ff5252';
    ctx.font = 'bold 40px Noto Sans KR';
    ctx.textAlign = 'center';
    ctx.fillText("⚠️ 심층 순환 멈춤", W/2, H/2);
    ctx.font = '20px Noto Sans KR';
    ctx.fillText("밀도 차이가 사라져 바닷물이 섞이지 않습니다.", W/2, H/2 + 40);
  }
  ctx.textAlign = 'left';
}

function drawBigArrow(x, y, dx, dy, color) {
  ctx.strokeStyle = color;
  ctx.lineWidth = 8;
  ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x+dx, y+dy); ctx.stroke();
  const angle = Math.atan2(dy, dx);
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(x+dx, y+dy);
  ctx.lineTo(x+dx - 20*Math.cos(angle-0.5), y+dy - 20*Math.sin(angle-0.5));
  ctx.lineTo(x+dx - 20*Math.cos(angle+0.5), y+dy - 20*Math.sin(angle+0.5));
  ctx.closePath(); ctx.fill();
}
function drawTextOverlay(txt, x, y, color) {
  ctx.fillStyle = color;
  ctx.font = 'bold 24px Noto Sans KR';
  ctx.textAlign = 'center';
  ctx.fillText(txt, x, y);
}

// 시간에 따른 상태 업데이트 로직 (핵심)
function updateLogicByTime(t) {
  // 1. 자막 및 타이틀 처리
  const title = document.getElementById('center-title');
  const subBox = document.getElementById('sub-text');
  
  // 타이틀
  if (t < 4.5) title.classList.add('show');
  else title.classList.remove('show');

  // 자막 찾기
  let activeSub = script.find(s => t >= s.t && t <= s.end);
  if (activeSub && !activeSub.showTitle) {
    if (subBox.innerHTML !== activeSub.text) {
      subBox.innerHTML = activeSub.text;
      subBox.classList.add('show');
    }
  } else {
    subBox.classList.remove('show');
  }

  // 2. 씬(Scene) 상태 처리
  // 초기화
  sceneState.highlightPhase = '';
  let targetCirc = 1;
  let targetIce = 1;
  let targetWarm = 0;
  let targetMelt = 0;

  if (t >= 15 && t < 26) {
    sceneState.highlightPhase = 'sink';
  } else if (t >= 26 && t < 31) {
    sceneState.highlightPhase = 'deep';
  }

  // 온난화 시작 (42초 ~)
  if (t >= 42) {
    targetWarm = Math.min(1, (t - 42) / 5); // 5초 동안 붉어짐
  }
  // 빙하 녹음 & 담수 유입 (46초 ~)
  if (t >= 46) {
    targetIce = Math.max(0.1, 1 - (t - 46) / 6); // 6초 동안 녹음
    targetMelt = Math.min(1, (t - 46) / 2);
  }
  // 순환 정지 (52초 ~)
  if (t >= 50) {
    targetCirc = Math.max(0, 1 - (t - 50) / 4); // 서서히 멈춤
  }

  // 부드러운 전환 적용
  sceneState.circSpeed += (targetCirc - sceneState.circSpeed) * 0.1;
  sceneState.iceSize += (targetIce - sceneState.iceSize) * 0.1;
  sceneState.warmTint += (targetWarm - sceneState.warmTint) * 0.1;
  sceneState.meltDrops += (targetMelt - sceneState.meltDrops) * 0.1;

  // 플래시 이펙트 (경고 뜰 때)
  const flash = document.getElementById('flash');
  if (t >= 51.8 && t <= 52.5) flash.style.opacity = 1;
  else flash.style.opacity = 0;
}

// 메인 루프
function loop(now) {
  let dt = (now - lastTime) / 1000;
  lastTime = now;

  if (isPlaying) {
    currentTime += dt;
    if (currentTime >= DURATION) {
      currentTime = DURATION;
      pauseVideo();
      document.getElementById('start-overlay').style.display = 'flex';
      document.querySelector('.big-play').innerHTML = '↺';
    }
  }

  updateLogicByTime(currentTime);
  draw();
  updateUI();

  requestAnimationFrame(loop);
}

// UI 업데이트
function updateUI() {
  document.getElementById('progress').style.width = (currentTime / DURATION * 100) + '%';
  document.getElementById('currTime').innerText = formatTime(currentTime);
  document.getElementById('totTime').innerText = formatTime(DURATION);
}
function formatTime(s) {
  let m = Math.floor(s / 60);
  let sec = Math.floor(s % 60);
  return m + ":" + (sec < 10 ? "0"+sec : sec);
}

// 컨트롤 함수
function startVideo() {
  document.getElementById('start-overlay').style.display = 'none';
  if (currentTime >= DURATION) currentTime = 0;
  playVideo();
}
function playVideo() {
  isPlaying = true;
  document.getElementById('playPauseBtn').innerText = '⏸';
  lastTime = performance.now();
}
function pauseVideo() {
  isPlaying = false;
  document.getElementById('playPauseBtn').innerText = '▶';
}
function togglePlay() {
  if (isPlaying) pauseVideo(); else playVideo();
}
function seek(e) {
  const rect = document.getElementById('progressBar').getBoundingClientRect();
  const clickX = e.clientX - rect.left;
  const ratio = Math.max(0, Math.min(1, clickX / rect.width));
  currentTime = ratio * DURATION;
  // 즉각적인 상태 반영
  sceneState.circSpeed = 1; sceneState.iceSize = 1; sceneState.warmTint = 0; sceneState.meltDrops = 0;
  updateLogicByTime(currentTime);
  draw();
}

// 초기화
requestAnimationFrame(loop);

</script>
</body>
