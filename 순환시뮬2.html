<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>심층 순환 시뮬레이션</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&family=JetBrains+Mono:wght@400;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#000;overflow:hidden;font-family:'Noto Sans KR',sans-serif;color:#c8dce8;user-select:none}
  canvas#sim{display:block;position:fixed;top:0;left:0;width:100vw;height:100vh}

  .topbar{
    position:fixed;top:0;left:0;right:0;z-index:100;
    display:flex;align-items:center;gap:14px;
    padding:10px 20px;
    background:linear-gradient(180deg,rgba(5,12,25,.94),rgba(5,12,25,.5),transparent);
  }
  .logo{font-weight:900;font-size:1.1em;color:#4fc3f7;letter-spacing:1px}
  .logo small{font-weight:300;color:#506878;font-size:.65em;margin-left:8px}
  .rec{display:flex;align-items:center;gap:6px;margin-left:auto}
  .rec-dot{width:8px;height:8px;border-radius:50%;background:#f44336;animation:blink 1.2s infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
  .rec span{font-size:.72em;color:#f44336;font-weight:700}
  .fps-box{font-family:'JetBrains Mono';font-size:.7em;color:#3a5068;margin-left:12px}

  .panel{
    position:fixed;left:0;top:48px;bottom:55px;width:280px;z-index:90;
    background:rgba(5,12,25,.9);border-right:1px solid rgba(79,195,247,.07);
    backdrop-filter:blur(14px);overflow-y:auto;padding:16px;
    display:flex;flex-direction:column;gap:12px;
    scrollbar-width:thin;scrollbar-color:#1a2a40 transparent;
  }
  .section-title{font-size:.62em;text-transform:uppercase;letter-spacing:2px;color:#2a4058;font-weight:700;margin-bottom:8px;border-bottom:1px solid rgba(79,195,247,.05);padding-bottom:6px}
  .param{margin-bottom:8px}
  .param-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
  .param-head .lbl{font-size:.78em;color:#6888a0}
  .param-head .val{font-family:'JetBrains Mono';font-size:.82em;color:#4fc3f7;font-weight:700}
  input[type=range]{width:100%;height:5px;-webkit-appearance:none;background:rgba(79,195,247,.08);border-radius:3px;outline:none;cursor:pointer}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;background:#4fc3f7;border-radius:50%;cursor:pointer;box-shadow:0 0 10px rgba(79,195,247,.5)}

  .presets{display:grid;grid-template-columns:1fr 1fr;gap:5px}
  .pre-btn{padding:9px 6px;border:1px solid rgba(79,195,247,.1);background:rgba(79,195,247,.02);border-radius:8px;cursor:pointer;text-align:center;font-size:.72em;color:#6888a0;transition:all .2s;font-family:inherit}
  .pre-btn:hover{border-color:#4fc3f7;color:#4fc3f7;background:rgba(79,195,247,.08)}
  .pre-btn.on{border-color:#4fc3f7;color:#fff;background:rgba(79,195,247,.15)}

  .chk-row{display:flex;align-items:center;gap:8px;font-size:.76em;color:#6888a0;cursor:pointer;margin-bottom:5px}
  .chk-row input{accent-color:#4fc3f7;cursor:pointer}

  .right-panel{
    position:fixed;right:0;top:48px;bottom:55px;width:200px;z-index:90;
    background:rgba(5,12,25,.9);border-left:1px solid rgba(79,195,247,.07);
    backdrop-filter:blur(14px);padding:14px;overflow-y:auto;
    display:flex;flex-direction:column;gap:8px;
  }
  .gauge{text-align:center;padding:6px 0}
  .gauge .g-label{font-size:.6em;text-transform:uppercase;letter-spacing:1.5px;color:#2a4058;margin-bottom:4px}
  .gauge .g-val{font-family:'JetBrains Mono';font-size:1.4em;font-weight:700}
  .gauge .g-unit{font-size:.5em;color:#3a5068}
  .gauge-bar{width:100%;height:6px;background:rgba(255,255,255,.04);border-radius:3px;overflow:hidden;margin-top:4px}
  .gauge-bar-fill{height:100%;border-radius:3px;transition:width .5s,background .5s}

  .data-line{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(79,195,247,.03)}
  .data-line .k{font-size:.68em;color:#3a5068}
  .data-line .v{font-size:.76em;font-family:'JetBrains Mono';font-weight:700}

  .graph-box{margin-top:4px}
  .graph-box canvas{width:100%;height:55px;border-radius:6px;border:1px solid rgba(79,195,247,.05)}

  .bottombar{
    position:fixed;bottom:0;left:0;right:0;z-index:100;
    background:linear-gradient(transparent,rgba(5,12,25,.92));
    padding:10px 20px;display:flex;align-items:center;gap:14px;
  }
  .p-btn{
    width:38px;height:38px;border-radius:50%;border:1.5px solid rgba(79,195,247,.35);
    background:rgba(79,195,247,.06);color:#4fc3f7;font-size:1.1em;
    cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;
  }
  .p-btn:hover{background:rgba(79,195,247,.18);border-color:#4fc3f7}
  .time-box{font-family:'JetBrains Mono';font-size:.76em;color:#3a5068;min-width:110px;text-align:center}
  .legend{display:flex;gap:16px;flex:1;justify-content:center}
  .leg{display:flex;align-items:center;gap:5px;font-size:.7em;color:#506878}
  .leg i{width:10px;height:10px;border-radius:50%;display:inline-block}
  .spd-grp{display:flex;gap:4px;margin-left:auto;align-items:center}
  .spd-grp span{font-size:.65em;color:#3a5068}
  .sp{padding:4px 10px;border:1px solid rgba(79,195,247,.12);background:none;color:#506878;border-radius:5px;font-size:.7em;cursor:pointer;font-family:'JetBrains Mono';transition:all .2s}
  .sp:hover,.sp.on{color:#4fc3f7;border-color:#4fc3f7;background:rgba(79,195,247,.07)}

  .alert-overlay{
    position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:80;
    padding:20px 40px;border-radius:14px;text-align:center;pointer-events:none;
    opacity:0;transition:opacity .5s;
  }
  .alert-overlay.show{opacity:1}
</style>
</head>
<body>
<canvas id="sim"></canvas>

<div class="alert-overlay" id="alertBox"></div>

<div class="topbar">
  <div class="logo">DEEP CIRCULATION <small>Simulation</small></div>
  <div class="rec"><div class="rec-dot"></div><span>LIVE</span></div>
  <div class="fps-box" id="fpsBox">30 FPS</div>
</div>

<div class="panel" id="leftPanel">
  <div class="section-title">환경 변수 제어</div>
  <div class="param">
    <div class="param-head"><span class="lbl">고위도 수온</span><span class="val" id="vT">2.0°C</span></div>
    <input type="range" id="sT" min="-2" max="20" value="2" step=".5" oninput="up()">
  </div>
  <div class="param">
    <div class="param-head"><span class="lbl">표층 염분</span><span class="val" id="vS">35.0‰</span></div>
    <input type="range" id="sS" min="26" max="39" value="35" step=".2" oninput="up()">
  </div>
  <div class="param">
    <div class="param-head"><span class="lbl">빙하 융해율</span><span class="val" id="vI">0%</span></div>
    <input type="range" id="sI" min="0" max="100" value="0" step="1" oninput="up()">
  </div>
  <div class="param">
    <div class="param-head"><span class="lbl">바람 세기</span><span class="val" id="vW">50%</span></div>
    <input type="range" id="sW" min="0" max="100" value="50" step="1" oninput="up()">
  </div>
  <div class="param">
    <div class="param-head"><span class="lbl">입자 크기</span><span class="val" id="vPS">1.0x</span></div>
    <input type="range" id="sPS" min=".5" max="3" value="1" step=".1" oninput="up()">
  </div>
  <div class="param">
    <div class="param-head"><span class="lbl">입자 수</span><span class="val" id="vPC">400</span></div>
    <input type="range" id="sPC" min="50" max="1000" value="400" step="10" oninput="up()">
  </div>
  <div class="param">
    <div class="param-head"><span class="lbl">난류 강도</span><span class="val" id="vTurb">30%</span></div>
    <input type="range" id="sTurb" min="0" max="100" value="30" step="1" oninput="up()">
  </div>

  <div class="section-title">프리셋 시나리오</div>
  <div class="presets">
    <button class="pre-btn on" id="prNorm" onclick="pre('norm')">정상</button>
    <button class="pre-btn" id="prWarm" onclick="pre('warm')">온난화</button>
    <button class="pre-btn" id="prIceA" onclick="pre('iceA')">빙하기</button>
    <button class="pre-btn" id="prStop" onclick="pre('stop')">순환정지</button>
    <button class="pre-btn" id="prFast" onclick="pre('fast')">강한순환</button>
    <button class="pre-btn" id="prYD" onclick="pre('YD')">영거드라이아스</button>
  </div>

  <div class="section-title">표시 옵션</div>
  <label class="chk-row"><input type="checkbox" id="oTrail" checked onchange="up()">긴 꼬리 효과</label>
  <label class="chk-row"><input type="checkbox" id="oGlow" checked onchange="up()">글로우 효과</label>
  <label class="chk-row"><input type="checkbox" id="oArrow" checked onchange="up()">흐름 화살표</label>
  <label class="chk-row"><input type="checkbox" id="oLabel" checked onchange="up()">라벨 표시</label>
  <label class="chk-row"><input type="checkbox" id="oPulse" checked onchange="up()">입자 맥동</label>
  <label class="chk-row"><input type="checkbox" id="oVortex" onchange="up()">와류 시각화</label>
</div>

<div class="right-panel">
  <div class="section-title" style="text-align:center">실시간 계측</div>

  <div class="gauge">
    <div class="g-label">순환 강도</div>
    <div class="g-val" id="gCircV" style="color:#4fc3f7">100<span class="g-unit">%</span></div>
    <div class="gauge-bar"><div class="gauge-bar-fill" id="gCircB" style="width:100%;background:#4fc3f7"></div></div>
  </div>
  <div class="gauge">
    <div class="g-label">밀도 차이</div>
    <div class="g-val" id="gDensV" style="color:#69f0ae">2.8<span class="g-unit">kg/m³</span></div>
    <div class="gauge-bar"><div class="gauge-bar-fill" id="gDensB" style="width:80%;background:#69f0ae"></div></div>
  </div>
  <div class="gauge">
    <div class="g-label">침강 속도</div>
    <div class="g-val" id="gSinkV" style="color:#ffd54f">3.2<span class="g-unit">cm/s</span></div>
    <div class="gauge-bar"><div class="gauge-bar-fill" id="gSinkB" style="width:90%;background:#ffd54f"></div></div>
  </div>
  <div class="gauge">
    <div class="g-label">수송량</div>
    <div class="g-val" id="gTransV" style="color:#b39ddb">18.5<span class="g-unit">Sv</span></div>
    <div class="gauge-bar"><div class="gauge-bar-fill" id="gTransB" style="width:85%;background:#b39ddb"></div></div>
  </div>

  <div class="section-title" style="text-align:center;margin-top:4px">순환 강도 기록</div>
  <div class="graph-box"><canvas id="graphC" width="360" height="110"></canvas></div>

  <div style="margin-top:6px">
    <div class="data-line"><span class="k">심층 수온</span><span class="v" id="dDeepT" style="color:#81d4fa">2.1°C</span></div>
    <div class="data-line"><span class="k">표층 수온</span><span class="v" id="dSurfT" style="color:#ff8a80">18.3°C</span></div>
    <div class="data-line"><span class="k">총 입자</span><span class="v" id="dPart" style="color:#b39ddb">400</span></div>
    <div class="data-line"><span class="k">상태</span><span class="v" id="dStatus" style="color:#69f0ae">정상</span></div>
  </div>
</div>

<div class="bottombar">
  <button class="p-btn" id="playBtn" onclick="togglePlay()">⏸</button>
  <button class="p-btn" onclick="resetSim()" style="font-size:.8em">⏮</button>
  <div class="time-box" id="timeBox">T = 0 yr</div>
  <div class="legend">
    <div class="leg"><i style="background:#ff6b6b"></i>표층류</div>
    <div class="leg"><i style="background:#ffd54f"></i>침강</div>
    <div class="leg"><i style="background:#4fc3f7"></i>심층류</div>
    <div class="leg"><i style="background:#69f0ae"></i>용승</div>
  </div>
  <div class="spd-grp">
    <span>속도</span>
    <button class="sp" onclick="spd(.25)">.25x</button>
    <button class="sp" onclick="spd(.5)">.5x</button>
    <button class="sp on" onclick="spd(1)" id="s1">1x</button>
    <button class="sp" onclick="spd(2)">2x</button>
    <button class="sp" onclick="spd(5)">5x</button>
  </div>
</div>

<script>
const C=document.getElementById('sim'), X=C.getContext('2d');
const DPR=Math.min(devicePixelRatio||1,2);
function resize(){C.width=innerWidth*DPR;C.height=innerHeight*DPR;X.setTransform(DPR,0,0,DPR,0,0)}
resize();addEventListener('resize',resize);
const W=()=>innerWidth, H=()=>innerHeight;

let playing=true, speed=1, simTime=0, fc=0, fpsT=0, dFps=60;

// ===== ENV =====
let E={temp:2,sal:35,ice:0,wind:50,pSize:1,pCount:400,turb:30,
  trail:true,glow:true,arrow:true,label:true,pulse:true,vortex:false};
let D={str:1,dens:1,sink:3.2,trans:18.5};

let hist=[];const HMAX=180;

// ===== PARTICLES =====
let P=[];

class Pt{
  constructor(){
    this.pg=Math.random();
    this.ox=(Math.random()-.5)*24;
    this.oy=(Math.random()-.5)*16;
    this.baseSize=2+Math.random()*3;
    this.alpha=.4+Math.random()*.5;
    this.sp=.6+Math.random()*.8;
    this.trail=[];
    this.maxTrail=8+Math.floor(Math.random()*10);
    this.phase='surface';
    this.phaseT=0;
    // individual turbulence
    this.turbSeed=Math.random()*100;
    this.wobbleAmp=.5+Math.random()*1.5;
    this.wobbleFreq=1+Math.random()*3;
    // pulse
    this.pulsePhase=Math.random()*Math.PI*2;
    this.pulseSpeed=1.5+Math.random()*2;
    // acceleration tracking
    this.prevX=0;this.prevY=0;
    this.vx=0;this.vy=0;
  }

  getPos(w,h,sY,dY,lX,rX,str,turb){
    const p=this.pg;
    let x,y,phase,t;
    const turbF=turb/100;
    const wobble=Math.sin(simTime*this.wobbleFreq+this.turbSeed)*this.wobbleAmp*turbF;
    const wobble2=Math.cos(simTime*this.wobbleFreq*.7+this.turbSeed*1.3)*this.wobbleAmp*.6*turbF;

    if(p<.25){
      phase='surface'; t=p/.25;
      // Surface: strong horizontal with wave motion
      x=lX+(rX-lX)*t;
      const waveH=3+E.wind/15;
      y=sY+Math.sin(t*12+simTime*2.5)*waveH+Math.sin(t*5+simTime*1.2)*waveH*.5+wobble*8+this.oy*.3;
    }else if(p<.42){
      phase='sinking'; t=(p-.25)/.17;
      // Sinking: dramatic downward spiral
      const spiralR=18+wobble*12;
      const spiralAngle=t*Math.PI*3+this.turbSeed;
      x=rX+Math.sin(spiralAngle)*spiralR*str+wobble2*6;
      // Accelerating descent
      const accelT=t*t; // quadratic acceleration
      y=sY+(dY-sY)*accelT;
    }else if(p<.82){
      phase='deep'; t=(p-.42)/.40;
      x=rX+(lX-rX)*t;
      // Deep: slow undulation
      y=dY+Math.sin(t*8+simTime*.6)*5+Math.cos(t*3+simTime*.3)*3+wobble*6+this.oy*.35;
    }else{
      phase='upwelling'; t=(p-.82)/.18;
      // Upwelling: expanding spiral rise
      const riseR=14*(1-t)+wobble*8;
      const riseAngle=t*Math.PI*2.5+this.turbSeed;
      x=lX+Math.sin(riseAngle)*riseR+wobble2*5;
      // Decelerating rise (fast start, slow end)
      const decelT=1-(1-t)*(1-t);
      y=dY+(sY-dY)*decelT;
    }
    this.phase=phase;this.phaseT=t;
    return{x,y,phase,t};
  }

  update(dt,str){
    let s=.0003*dt*this.sp*Math.max(.015,str);
    const p=this.pg;

    // Phase-dependent speed with dramatic differences
    if(p>=.25&&p<.42){
      // Sinking: accelerate with density
      s*=1.6*Math.max(.05,str)*Math.max(.05,D.dens);
    }else if(p>=.42&&p<.82){
      // Deep: slowest
      s*=.7;
    }else if(p>=.82){
      // Upwelling: moderate
      s*=1.1;
    }else{
      // Surface: wind-dependent
      s*=.8+E.wind/100;
    }

    this.pg+=s;
    if(this.pg>=1)this.pg-=1;
  }

  draw(ctx,w,h,sY,dY,lX,rX,str){
    const pos=this.getPos(w,h,sY,dY,lX,rX,str,E.turb);
    const col=COLORS[pos.phase];
    const rgb=COLORS_RGB[pos.phase];

    // Velocity for stretch effect
    this.vx=pos.x-this.prevX; this.vy=pos.y-this.prevY;
    this.prevX=pos.x; this.prevY=pos.y;
    const vel=Math.sqrt(this.vx*this.vx+this.vy*this.vy);

    // Dynamic size
    let sz=this.baseSize*E.pSize;
    // Phase-dependent size
    if(pos.phase==='sinking') sz*=1.3+pos.t*.4; // grow while sinking
    if(pos.phase==='upwelling') sz*=1.2-pos.t*.3; // shrink while rising
    // Pulse
    if(E.pulse){
      const pulse=Math.sin(simTime*this.pulseSpeed+this.pulsePhase)*.25+1;
      sz*=pulse;
    }
    // Velocity stretch
    const stretch=Math.min(2,1+vel*.03);
    sz*=Math.max(.25,str);

    // Trail
    if(E.trail){
      this.trail.push({x:pos.x,y:pos.y,a:this.alpha});
      while(this.trail.length>this.maxTrail) this.trail.shift();
      if(this.trail.length>2){
        ctx.lineCap='round';ctx.lineJoin='round';
        for(let i=1;i<this.trail.length;i++){
          const t0=this.trail[i-1], t1=this.trail[i];
          const frac=i/this.trail.length;
          ctx.beginPath();ctx.moveTo(t0.x,t0.y);ctx.lineTo(t1.x,t1.y);
          ctx.strokeStyle=`rgba(${rgb[0]},${rgb[1]},${rgb[2]},${frac*.2*this.alpha})`;
          ctx.lineWidth=sz*frac*.8;
          ctx.stroke();
        }
      }
    }

    // Glow
    if(E.glow){
      ctx.globalAlpha=this.alpha*.2;
      const glowR=sz*5;
      const g=ctx.createRadialGradient(pos.x,pos.y,0,pos.x,pos.y,glowR);
      g.addColorStop(0,`rgba(${rgb[0]},${rgb[1]},${rgb[2]},.4)`);
      g.addColorStop(.5,`rgba(${rgb[0]},${rgb[1]},${rgb[2]},.08)`);
      g.addColorStop(1,'transparent');
      ctx.fillStyle=g;
      ctx.beginPath();ctx.arc(pos.x,pos.y,glowR,0,Math.PI*2);ctx.fill();
    }

    // Core with stretch
    ctx.globalAlpha=this.alpha*.9;
    ctx.fillStyle=col;
    ctx.save();
    ctx.translate(pos.x,pos.y);
    if(vel>1){
      const angle=Math.atan2(this.vy,this.vx);
      ctx.rotate(angle);
    }
    ctx.beginPath();
    ctx.ellipse(0,0,sz*stretch,sz/stretch,0,0,Math.PI*2);
    ctx.fill();

    // Bright center
    ctx.globalAlpha=this.alpha*.6;
    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(0,0,sz*.3,0,Math.PI*2);ctx.fill();

    ctx.restore();
    ctx.globalAlpha=1;
  }
}

const COLORS={surface:'#ff6b6b',sinking:'#ffb74d',deep:'#29b6f6',upwelling:'#66ff99'};
const COLORS_RGB={surface:[255,107,107],sinking:[255,183,77],deep:[41,182,246],upwelling:[102,255,153]};

function rebuild(n){
  while(P.length<n) P.push(new Pt());
  if(P.length>n) P.splice(n);
}
rebuild(400);

// ===== COMPUTE =====
function compute(){
  const{temp,sal,ice,wind}=E;
  const tF=Math.max(0,1-(temp-(-2))/22);
  const sF=(sal-26)/13;
  const iF=Math.max(0,1-ice/65);
  const wF=.3+wind/100*.7;
  D.str=Math.max(.01,Math.min(1.5, tF*.30+sF*.28+iF*.26+wF*.16));
  D.dens=tF*.5+sF*.5;
  D.sink=D.str*3.8;
  D.trans=D.str*22;
}

// ===== DRAW =====
function draw(dt){
  const w=W(),h=H();
  const sY=h*.18, dY=h*.84;
  const lX=300, rX=w-220;
  const str=D.str;

  // ---- Background ----
  const warmth=(1-str)*.8;
  const sky=X.createLinearGradient(0,0,0,sY);
  sky.addColorStop(0,`rgb(${5+warmth*40},${8+warmth*6},${22-warmth*14})`);
  sky.addColorStop(1,`rgb(${10+warmth*28},${16+warmth*10},${38-warmth*18})`);
  X.fillStyle=sky;X.fillRect(0,0,w,sY);

  // Stars
  X.fillStyle='rgba(255,255,255,.3)';
  for(let i=0;i<25;i++){
    const sx=(i*181+20)%w,sy=(i*79+5)%(sY-10);
    const twinkle=Math.sin(simTime*.8+i*1.7)*.15+.35;
    X.globalAlpha=twinkle;
    X.beginPath();X.arc(sx,sy,.7,0,Math.PI*2);X.fill();
  }
  X.globalAlpha=1;

  // Sun
  const sunR=16+warmth*35;
  const sg=X.createRadialGradient(rX-20,sY*.25,0,rX-20,sY*.25,sunR*3);
  sg.addColorStop(0,`rgba(255,210,80,${.35+warmth*.4})`);
  sg.addColorStop(.4,`rgba(255,180,50,${.1+warmth*.15})`);
  sg.addColorStop(1,'transparent');
  X.fillStyle=sg;X.beginPath();X.arc(rX-20,sY*.25,sunR*3,0,Math.PI*2);X.fill();

  // Ocean
  const oc=X.createLinearGradient(0,sY,0,h);
  oc.addColorStop(0,`rgb(${12+warmth*10},${56-warmth*8},${98-warmth*15})`);
  oc.addColorStop(.3,'#082c52');oc.addColorStop(.65,'#041830');oc.addColorStop(1,'#020a14');
  X.fillStyle=oc;X.fillRect(0,sY,w,h-sY);

  // Wave surface
  X.beginPath();X.moveTo(0,sY);
  const wA=2+E.wind/18;
  for(let x=0;x<=w;x+=2)
    X.lineTo(x,sY+Math.sin(x*.009+simTime*1.8)*wA+Math.sin(x*.004+simTime*.9)*wA*.7);
  X.lineTo(w,sY-5);X.lineTo(0,sY-5);X.closePath();
  X.fillStyle='rgba(79,195,247,.1)';X.fill();

  // Depth lines
  X.setLineDash([4,10]);X.lineWidth=.5;X.strokeStyle='rgba(79,195,247,.05)';
  [.25,.5,.75,1].forEach(f=>{
    const y=sY+(dY-sY)*f;
    X.beginPath();X.moveTo(lX-30,y);X.lineTo(rX+30,y);X.stroke();
  });
  X.setLineDash([]);

  // ---- Continents ----
  // Right (glacier)
  const iceS=Math.max(.03,1-E.ice/100);
  X.beginPath();X.moveTo(rX+15,sY);
  X.quadraticCurveTo(rX+55,sY-48*iceS,w,sY-35*iceS);
  X.lineTo(w,sY+40);X.lineTo(rX+15,sY+40);X.closePath();
  X.fillStyle='#111e30';X.fill();
  // Snow
  X.beginPath();X.moveTo(rX+15,sY);
  X.quadraticCurveTo(rX+55,sY-48*iceS,w,sY-35*iceS);
  X.lineTo(w,sY-28*iceS);X.quadraticCurveTo(rX+55,sY-40*iceS,rX+18,sY);X.closePath();
  X.fillStyle=`rgba(200,230,255,${.5*iceS})`;X.fill();
  // Ice chunks
  for(let i=0;i<Math.floor(iceS*6);i++){
    const ix=rX-5+i*18,iy=sY-4+Math.sin(simTime*.8+i)*2;
    X.fillStyle=`rgba(190,225,255,${.35*iceS})`;
    X.fillRect(ix,iy,13-i,5);
  }

  // Meltwater drops
  if(E.ice>10){
    const mA=Math.min(1,(E.ice-10)/50);
    for(let i=0;i<Math.floor(mA*10);i++){
      const dx=rX+5+Math.sin(simTime*1.5+i*1.1)*16+i*7;
      const dy=sY+5+((simTime*32+i*22)%55);
      const dropSize=2+mA*1.5;
      X.globalAlpha=mA*.4;X.fillStyle='#64b5f6';
      X.beginPath();X.arc(dx,dy,dropSize,0,Math.PI*2);X.fill();
    }
    if(mA>.3){
      X.globalAlpha=mA*.7;X.fillStyle='#64b5f6';
      X.font='bold 12px Noto Sans KR';X.textAlign='center';
      X.fillText('💧 담수 유입',rX+30,sY+28);
    }
    X.globalAlpha=1;
  }

  // Left continent
  X.beginPath();X.moveTo(0,sY-15);X.quadraticCurveTo(lX*.3,sY-25,lX-20,sY);
  X.lineTo(0,sY);X.closePath();X.fillStyle='#0e1e12';X.fill();

  // Floor
  X.beginPath();X.moveTo(0,h);
  for(let x=0;x<=w;x+=8) X.lineTo(x,h-5+Math.sin(x*.006)*3+Math.sin(x*.02)*1.2);
  X.lineTo(w,h);X.closePath();X.fillStyle='#030810';X.fill();

  // ---- Flow ghost paths ----
  const pA=Math.max(.01,str*.1);
  X.globalAlpha=pA;X.lineCap='round';
  // Surface
  X.strokeStyle='rgba(255,107,107,.4)';X.lineWidth=28;
  X.beginPath();X.moveTo(lX,sY+10);X.lineTo(rX,sY+10);X.stroke();
  // Deep
  X.strokeStyle='rgba(41,182,246,.3)';X.lineWidth=24;
  X.beginPath();X.moveTo(rX,dY);X.lineTo(lX,dY);X.stroke();
  // Sinking
  X.strokeStyle='rgba(255,183,77,.25)';X.lineWidth=20;
  X.beginPath();X.moveTo(rX+8,sY+18);X.lineTo(rX+8,dY-8);X.stroke();
  // Upwelling
  X.strokeStyle='rgba(102,255,153,.2)';X.lineWidth=18;
  X.beginPath();X.moveTo(lX-8,dY-8);X.lineTo(lX-8,sY+18);X.stroke();
  X.globalAlpha=1;

  // ---- Vortex visualization ----
  if(E.vortex){
    X.globalAlpha=str*.12;
    // Sinking vortex
    for(let i=0;i<5;i++){
      const vy=sY+30+i*(dY-sY-40)/5;
      const vr=15+Math.sin(simTime*2+i)*5;
      X.strokeStyle='#ffb74d';X.lineWidth=1.5;
      X.beginPath();X.arc(rX+8,vy,vr,simTime*2+i,simTime*2+i+Math.PI*1.2);X.stroke();
    }
    // Upwelling vortex
    for(let i=0;i<5;i++){
      const vy=dY-30-i*(dY-sY-40)/5;
      const vr=12+Math.sin(simTime*2+i)*4;
      X.strokeStyle='#66ff99';X.lineWidth=1.5;
      X.beginPath();X.arc(lX-8,vy,vr,-simTime*2+i,-simTime*2+i+Math.PI*1.2);X.stroke();
    }
    X.globalAlpha=1;
  }

  // ---- Arrows ----
  if(E.arrow){
    const aA=Math.max(.03,str*.5);
    // Surface →
    for(let i=0;i<6;i++){
      const ax=lX+(rX-lX)*(i+.5)/6;
      const pulse=Math.sin(simTime*3+i*.8)*.3+.7;
      X.globalAlpha=aA*pulse;
      drawTri(X,ax,sY+10,14,0,'#ff6b6b');
    }
    // Deep ←
    for(let i=0;i<6;i++){
      const ax=rX-(rX-lX)*(i+.5)/6;
      const pulse=Math.sin(simTime*3+i*.8+2)*.3+.7;
      X.globalAlpha=aA*pulse;
      drawTri(X,ax,dY,-14,0,'#29b6f6');
    }
    // Sink ↓
    for(let i=0;i<4;i++){
      const ay=sY+35+i*(dY-sY-50)/4;
      const pulse=Math.sin(simTime*3+i+1)*.3+.7;
      X.globalAlpha=aA*pulse;
      drawTri(X,rX+8,ay,0,14,'#ffb74d');
    }
    // Up ↑
    for(let i=0;i<4;i++){
      const ay=dY-35-i*(dY-sY-50)/4;
      const pulse=Math.sin(simTime*3+i+3)*.3+.7;
      X.globalAlpha=aA*pulse;
      drawTri(X,lX-8,ay,0,-14,'#66ff99');
    }
    X.globalAlpha=1;
  }

  // ---- PARTICLES ----
  P.forEach(p=>{
    if(playing) p.update(dt*60,str);
    p.draw(X,w,h,sY+10,dY,lX,rX,str);
  });

  // ---- Labels ----
  if(E.label){
    const lAlpha=Math.max(.08,str*.85);
    X.globalAlpha=lAlpha;X.textAlign='center';
    X.font='bold 15px Noto Sans KR';
    X.fillStyle='#ff6b6b';X.fillText('☀ 따뜻한 표층류 →',(lX+rX)/2,sY+45);
    X.fillStyle='#29b6f6';X.fillText('← 차가운 심층류 🌊',(lX+rX)/2,dY-18);
    X.fillStyle='#ffb74d';X.fillText('❄ 침강',rX+8,(sY+dY)/2-5);
    X.fillStyle='#66ff99';X.fillText('⬆ 용승',lX-8,(sY+dY)/2-5);

    X.font='11px Noto Sans KR';
    X.fillStyle='rgba(255,183,77,.55)';X.fillText('고밀도 해수',rX+8,(sY+dY)/2+14);
    X.fillStyle='rgba(102,255,153,.55)';X.fillText('영양염↑ 어장🐟',lX-8,(sY+dY)/2+14);

    // Temps
    X.font='bold 12px JetBrains Mono';
    X.fillStyle='#ff8a80';X.textAlign='left';
    X.fillText(`${(18+E.temp*.3).toFixed(1)}°C`,lX+10,sY-5);
    X.fillStyle='#81d4fa';X.textAlign='right';
    X.fillText(`${E.temp.toFixed(1)}°C`,rX-10,sY-5);

    X.globalAlpha=.35;X.font='10px Noto Sans KR';X.textAlign='center';
    X.fillStyle='#78909c';
    X.fillText('저위도 (적도)',lX+60,sY-16);
    X.fillText('고위도 (북대서양)',rX-40,sY-16);
    ['0m','1,000m','2,500m','4,000m'].forEach((l,i)=>{
      X.fillText(l,lX-55,sY+5+(dY-sY)*(i/3));
    });
    X.textAlign='left';X.globalAlpha=1;
  }

  // ---- Alert ----
  if(str<.12){
    X.fillStyle=`rgba(255,10,10,${.05+Math.sin(simTime*5)*.025})`;X.fillRect(0,0,w,h);
    X.globalAlpha=.9;X.textAlign='center';
    X.fillStyle='#ff5252';X.font='bold 24px Noto Sans KR';
    X.fillText('⚠  심층 순환 정지 위험  ⚠',(lX+rX)/2,(sY+dY)/2);
    X.font='14px Noto Sans KR';X.fillStyle='#ff8a80';
    X.fillText('밀도 차이 붕괴 → 유럽 한랭화 시나리오',(lX+rX)/2,(sY+dY)/2+28);
    X.textAlign='left';X.globalAlpha=1;
  }
}

function drawTri(c,x,y,dx,dy,col){
  const a=Math.atan2(dy,dx),l=10;
  c.fillStyle=col;c.beginPath();
  c.moveTo(x+dx,y+dy);
  c.lineTo(x+dx-l*Math.cos(a-.5),y+dy-l*Math.sin(a-.5));
  c.lineTo(x+dx-l*Math.cos(a+.5),y+dy-l*Math.sin(a+.5));
  c.closePath();c.fill();
}

// ===== GRAPH =====
function drawGraph(){
  const gc=document.getElementById('graphC'),gx=gc.getContext('2d');
  const gw=180,gh=55;
  gx.clearRect(0,0,360,110);gx.setTransform(2,0,0,2,0,0);
  gx.fillStyle='rgba(5,12,25,.4)';gx.fillRect(0,0,gw,gh);

  gx.strokeStyle='rgba(79,195,247,.05)';gx.lineWidth=.5;
  for(let i=1;i<4;i++){gx.beginPath();gx.moveTo(0,gh*i/4);gx.lineTo(gw,gh*i/4);gx.stroke();}

  if(hist.length>1){
    // Fill
    gx.beginPath();gx.moveTo(0,gh);
    hist.forEach((v,i)=>{gx.lineTo(i/(HMAX-1)*gw,gh-Math.min(1,v/1.5)*gh);});
    gx.lineTo((hist.length-1)/(HMAX-1)*gw,gh);gx.closePath();
    gx.fillStyle='rgba(79,195,247,.05)';gx.fill();
    // Line
    gx.beginPath();
    hist.forEach((v,i)=>{
      const x=i/(HMAX-1)*gw,y=gh-Math.min(1,v/1.5)*gh;
      if(i===0)gx.moveTo(x,y);else gx.lineTo(x,y);
    });
    const lineColor=D.str>.6?'#4fc3f7':D.str>.3?'#ffd54f':'#ff5252';
    gx.strokeStyle=lineColor;gx.lineWidth=1.5;gx.stroke();
    // Current dot
    const cx=(hist.length-1)/(HMAX-1)*gw,cy=gh-Math.min(1,hist[hist.length-1]/1.5)*gh;
    gx.fillStyle=lineColor;gx.beginPath();gx.arc(cx,cy,3,0,Math.PI*2);gx.fill();
    gx.fillStyle=lineColor;gx.globalAlpha=.3;gx.beginPath();gx.arc(cx,cy,6,0,Math.PI*2);gx.fill();gx.globalAlpha=1;
  }
}

// ===== UI UPDATE =====
function updateUI(){
  const s=D.str,sp=Math.round(s*100);
  const col=sp>60?'#4fc3f7':sp>30?'#ffd54f':'#ff5252';
  document.getElementById('gCircV').innerHTML=`${sp}<span class="g-unit">%</span>`;
  document.getElementById('gCircV').style.color=col;
  document.getElementById('gCircB').style.width=Math.min(100,sp)+'%';
  document.getElementById('gCircB').style.background=col;

  const dd=(D.dens*3.2).toFixed(1);
  const dc=D.dens>.6?'#69f0ae':D.dens>.3?'#ffd54f':'#ff5252';
  document.getElementById('gDensV').innerHTML=`${dd}<span class="g-unit">kg/m³</span>`;
  document.getElementById('gDensV').style.color=dc;
  document.getElementById('gDensB').style.width=Math.min(100,D.dens*100)+'%';
  document.getElementById('gDensB').style.background=dc;

  const ss=D.sink.toFixed(1);
  const sc2=s>.6?'#ffd54f':s>.3?'#ff9800':'#ff5252';
  document.getElementById('gSinkV').innerHTML=`${ss}<span class="g-unit">cm/s</span>`;
  document.getElementById('gSinkV').style.color=sc2;
  document.getElementById('gSinkB').style.width=Math.min(100,s/1.5*100)+'%';
  document.getElementById('gSinkB').style.background=sc2;

  document.getElementById('gTransV').innerHTML=`${D.trans.toFixed(1)}<span class="g-unit">Sv</span>`;
  document.getElementById('gTransB').style.width=Math.min(100,D.trans/30*100)+'%';

  document.getElementById('dDeepT').textContent=(1+E.temp*.08).toFixed(1)+'°C';
  document.getElementById('dSurfT').textContent=(18+E.temp*.3).toFixed(1)+'°C';
  document.getElementById('dPart').textContent=P.length;

  const status=sp>65?'정상':sp>35?'⚠ 주의':sp>12?'🔴 위험':'🚨 정지';
  const stEl=document.getElementById('dStatus');
  stEl.textContent=status;
  stEl.style.color=sp>65?'#69f0ae':sp>35?'#ffd54f':'#ff5252';
}

// ===== CONTROLS =====
function up(){
  E.temp=+document.getElementById('sT').value;
  E.sal=+document.getElementById('sS').value;
  E.ice=+document.getElementById('sI').value;
  E.wind=+document.getElementById('sW').value;
  E.pSize=+document.getElementById('sPS').value;
  E.pCount=+document.getElementById('sPC').value;
  E.turb=+document.getElementById('sTurb').value;
  E.trail=document.getElementById('oTrail').checked;
  E.glow=document.getElementById('oGlow').checked;
  E.arrow=document.getElementById('oArrow').checked;
  E.label=document.getElementById('oLabel').checked;
  E.pulse=document.getElementById('oPulse').checked;
  E.vortex=document.getElementById('oVortex').checked;

  document.getElementById('vT').textContent=E.temp.toFixed(1)+'°C';
  document.getElementById('vS').textContent=E.sal.toFixed(1)+'‰';
  document.getElementById('vI').textContent=E.ice+'%';
  document.getElementById('vW').textContent=E.wind+'%';
  document.getElementById('vPS').textContent=E.pSize.toFixed(1)+'x';
  document.getElementById('vPC').textContent=E.pCount;
  document.getElementById('vTurb').textContent=E.turb+'%';

  rebuild(E.pCount);compute();
}

function pre(name){
  const presets={
    norm:{t:2,s:35,i:0,w:50,ps:1,turb:30},
    warm:{t:12,s:31,i:60,w:30,ps:1.2,turb:50},
    iceA:{t:-1.5,s:37,i:0,w:75,ps:.9,turb:20},
    stop:{t:18,s:27,i:95,w:10,ps:1.5,turb:70},
    fast:{t:-1,s:38,i:0,w:85,ps:1,turb:25},
    YD:{t:14,s:28,i:85,w:20,ps:1.3,turb:60},
  };
  const p=presets[name];
  document.getElementById('sT').value=p.t;
  document.getElementById('sS').value=p.s;
  document.getElementById('sI').value=p.i;
  document.getElementById('sW').value=p.w;
  document.getElementById('sPS').value=p.ps;
  document.getElementById('sTurb').value=p.turb;
  document.querySelectorAll('.pre-btn').forEach(b=>b.classList.remove('on'));
  const el=document.getElementById('pr'+name.charAt(0).toUpperCase()+name.slice(1));
  if(el) el.classList.add('on');
  up();
}

function togglePlay(){playing=!playing;document.getElementById('playBtn').textContent=playing?'⏸':'▶';}
function resetSim(){simTime=0;hist=[];}
function spd(s){speed=s;document.querySelectorAll('.sp').forEach(b=>b.classList.toggle('on',b.textContent===s+'x'));}

addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();togglePlay();}});

// ===== MAIN LOOP =====
let lastT=performance.now(),graphT=0;

function loop(now){
  const rawDt=(now-lastT)/1000;lastT=now;
  const dt=Math.min(rawDt,.05);

  fc++;fpsT+=rawDt;
  if(fpsT>=.5){dFps=Math.round(fc/fpsT);fc=0;fpsT=0;document.getElementById('fpsBox').textContent=dFps+' FPS';}

  if(playing){
    simTime+=dt*speed;
    graphT+=dt;
    if(graphT>.25){graphT=0;hist.push(D.str);if(hist.length>HMAX)hist.shift();}
  }

  X.clearRect(0,0,W(),H());
  draw(dt*speed);

  document.getElementById('timeBox').textContent=`T = ${Math.floor(simTime*50).toLocaleString()} yr`;

  if(fc%8===0){updateUI();drawGraph();}

  requestAnimationFrame(loop);
}

compute();updateUI();drawGraph();
requestAnimationFrame(loop);
</script>
